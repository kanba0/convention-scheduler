services:
  db:
    image: postgres:17
    container_name: convention_scheduler_db
    environment:
      POSTGRES_USER: convention
      POSTGRES_PASSWORD: convention
      POSTGRES_DB: convention_scheduler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convention -d convention_scheduler"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
